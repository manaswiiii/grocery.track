<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>grocery.track</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FBF8F3;--card:#FFFFFF;--ink:#1C1A17;--ink2:#5C5853;--ink3:#9C9890;
  --b-amber:#EF9F27;--l-amber:#FAEEDA;--d-amber:#633806;
  --b-teal:#1D9E75;--l-teal:#E1F5EE;--d-teal:#04342C;
  --b-blue:#378ADD;--l-blue:#E6F1FB;--d-blue:#042C53;
  --b-coral:#D85A30;--l-coral:#FAECE7;--d-coral:#4A1B0C;
  --b-green:#639922;--l-green:#EAF3DE;--d-green:#173404;
  --b-red:#E24B4A;--l-red:#FCEBEB;--d-red:#501313;
  --b-purple:#7F77DD;--l-purple:#EEEDFE;--d-purple:#26215C;
  --border:rgba(0,0,0,0.08);--shadow:0 2px 16px rgba(0,0,0,0.06);
  --r:14px;--rsm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:5rem;}
button,select,input{font-family:'DM Sans',sans-serif;}
header{background:var(--card);border-bottom:1px solid var(--border);padding:1.1rem 1.25rem .9rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.logo{font-family:'DM Serif Display',serif;font-size:21px;color:var(--ink);line-height:1;}
.logo span{color:var(--b-teal);}
.logo-sub{font-size:11px;color:var(--ink3);margin-top:2px;}
.header-right{display:flex;gap:8px;align-items:center;}
.hdr-btn{background:none;border:1px solid var(--border);border-radius:var(--rsm);padding:6px 12px;font-size:12px;color:var(--ink2);transition:all .13s;}
.hdr-btn:hover{background:var(--l-amber);color:var(--d-amber);border-color:var(--b-amber);}
.hdr-btn.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
.hdr-btn.primary:hover{background:#2e2b27;}

/* TABS */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:100;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-size:13px;font-weight:500;padding:10px 16px;border-bottom:2px solid transparent;color:var(--ink3);cursor:pointer;white-space:nowrap;flex-shrink:0;background:none;border-top:none;border-left:none;border-right:none;transition:all .15s;}
.tab.active{color:var(--b-teal);border-bottom-color:var(--b-teal);}
.tab:hover:not(.active){color:var(--ink2);}

/* PAGES */
.page{display:none;padding:1.25rem;max-width:740px;margin:0 auto;}
.page.active{display:block;}
.page-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:1.1rem;margin-top:.2rem;}
.page-title span{color:var(--b-teal);}

/* SUMMARY CARDS */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem;}
.summary-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:.9rem 1rem;box-shadow:var(--shadow);text-align:center;}
.sc-num{font-size:26px;font-weight:500;line-height:1.1;}
.sc-label{font-size:11px;color:var(--ink3);margin-top:3px;}
.sc-ok .sc-num{color:var(--b-green);}
.sc-low .sc-num{color:var(--b-amber);}
.sc-out .sc-num{color:var(--b-red);}
.sc-total .sc-num{color:var(--ink);}

/* INVENTORY */
.cat-block{margin-bottom:1.25rem;}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;user-select:none;}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cat-title{font-size:14px;font-weight:500;}
.cat-count{font-size:11px;color:var(--ink3);margin-left:auto;}
.cat-chevron{font-size:12px;color:var(--ink3);transition:transform .18s;}
.cat-body{display:block;}
.cat-body.collapsed{display:none;}

.item-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--card);border-radius:var(--rsm);border:1px solid var(--border);margin-bottom:5px;transition:border-color .13s;}
.item-row:hover{border-color:rgba(0,0,0,0.15);}
.item-name{flex:1;font-size:13.5px;}
.item-name.out{text-decoration:line-through;color:var(--ink3);}
.status-btn{border-radius:99px;padding:4px 12px;font-size:11px;font-weight:500;border:1px solid;cursor:pointer;white-space:nowrap;transition:all .13s;flex-shrink:0;}
.s-ok{background:var(--l-green);color:var(--d-green);border-color:var(--b-green);}
.s-ok:hover{background:#C0DD97;}
.s-low{background:var(--l-amber);color:var(--d-amber);border-color:var(--b-amber);}
.s-low:hover{background:#FAC775;}
.s-out{background:var(--l-red);color:var(--d-red);border-color:var(--b-red);}
.s-out:hover{background:#F7C1C1;}
.item-note{font-size:11px;color:var(--ink3);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-delete{background:none;border:none;color:var(--ink3);font-size:16px;padding:2px 4px;border-radius:4px;line-height:1;opacity:0;transition:opacity .13s;}
.item-row:hover .item-delete{opacity:1;}
.item-delete:hover{color:var(--b-red);background:var(--l-red);}

/* ADD ITEM */
.add-panel{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:1rem 1.1rem;margin-bottom:1.25rem;box-shadow:var(--shadow);}
.add-panel-title{font-size:12px;font-weight:500;color:var(--ink2);margin-bottom:.75rem;display:flex;align-items:center;gap:6px;}
.add-panel-title::before{content:'';width:3px;height:13px;background:var(--b-teal);border-radius:2px;display:inline-block;}
.add-row{display:flex;gap:7px;flex-wrap:wrap;}
.add-input{border:1px solid var(--border);border-radius:var(--rsm);padding:7px 11px;font-size:13px;background:var(--bg);color:var(--ink);}
.add-input:focus{outline:none;border-color:var(--b-teal);background:var(--card);}
.add-select{border:1px solid var(--border);border-radius:var(--rsm);padding:7px 10px;font-size:13px;background:var(--bg);color:var(--ink);}
.add-select:focus{outline:none;border-color:var(--b-teal);}
.add-name{flex:1;min-width:130px;}
.add-note{min-width:100px;}
.add-btn-teal{background:var(--l-teal);color:var(--d-teal);border:1px solid var(--b-teal);border-radius:var(--rsm);padding:7px 16px;font-size:13px;font-weight:500;white-space:nowrap;}
.add-btn-teal:hover{background:#9FE1CB;}

/* SHOPPING LIST */
.shop-section{margin-bottom:1.25rem;}
.shop-section-title{font-size:13px;font-weight:500;color:var(--ink2);margin-bottom:.6rem;display:flex;align-items:center;gap:6px;}
.shop-section-title::before{content:'';width:3px;height:13px;border-radius:2px;display:inline-block;}
.shop-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--card);border-radius:var(--rsm);border:1px solid var(--border);margin-bottom:5px;}
.shop-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .13s;}
.shop-check.checked{background:var(--b-teal);border-color:var(--b-teal);color:#fff;}
.shop-item-name{flex:1;font-size:13.5px;}
.shop-item-name.checked{text-decoration:line-through;color:var(--ink3);}
.shop-item-tag{font-size:10px;border-radius:99px;padding:2px 9px;font-weight:500;}
.shop-item-remove{background:none;border:none;color:var(--ink3);font-size:15px;padding:2px 4px;border-radius:4px;line-height:1;}
.shop-item-remove:hover{color:var(--b-red);background:var(--l-red);}
.priority-high{background:var(--l-red);color:var(--d-red);}
.priority-med{background:var(--l-amber);color:var(--d-amber);}
.priority-low{background:var(--l-blue);color:var(--d-blue);}

/* MEAL CHECKER */
.meal-check-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:1rem 1.1rem;margin-bottom:.9rem;box-shadow:var(--shadow);}
.mc-meal-name{font-size:14px;font-weight:500;margin-bottom:.6rem;}
.mc-status{display:flex;align-items:center;gap:7px;margin-bottom:.5rem;}
.mc-badge{border-radius:99px;padding:3px 10px;font-size:11px;font-weight:500;}
.mc-ok{background:var(--l-green);color:var(--d-green);}
.mc-missing{background:var(--l-red);color:var(--d-red);}
.mc-partial{background:var(--l-amber);color:var(--d-amber);}
.mc-ing-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.mc-ing{border-radius:99px;padding:3px 10px;font-size:11px;border:1px solid;}
.mc-ing.have{background:var(--l-green);color:var(--d-green);border-color:var(--b-green);}
.mc-ing.missing{background:var(--l-red);color:var(--d-red);border-color:var(--b-red);}
.mc-ing.low{background:var(--l-amber);color:var(--d-amber);border-color:var(--b-amber);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.filter-btn{border-radius:99px;padding:5px 13px;font-size:12px;border:1px solid var(--border);background:var(--card);color:var(--ink2);cursor:pointer;transition:all .13s;}
.filter-btn.active{background:var(--l-teal);color:var(--d-teal);border-color:var(--b-teal);font-weight:500;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.open{display:flex;}
.modal{background:var(--card);border-radius:var(--r);padding:1.25rem;max-width:380px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.2);}
.modal-title{font-family:'DM Serif Display',serif;font-size:17px;margin-bottom:.9rem;}
.modal-btns{display:flex;gap:8px;margin-top:1rem;justify-content:flex-end;}
.btn-cancel{background:none;border:1px solid var(--border);border-radius:var(--rsm);padding:7px 16px;font-size:13px;color:var(--ink2);}
.btn-confirm{background:var(--ink);color:#fff;border:none;border-radius:var(--rsm);padding:7px 16px;font-size:13px;font-weight:500;}
.btn-confirm:hover{background:#2e2b27;}

.divider{border:none;border-top:1px solid var(--border);margin:1rem 0;}
.empty-msg{text-align:center;padding:2rem 1rem;color:var(--ink3);font-size:13px;font-style:italic;}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">grocery<span>.</span>track</div>
    <div class="logo-sub">linked to your meal plan</div>
  </div>
  <div class="header-right">
    <button class="hdr-btn" onclick="autoAddLowToShop()">+ Add low stock to list</button>
    <button class="hdr-btn primary" onclick="showPage('shop',document.querySelectorAll('.tab')[1])">View shopping list</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showPage('inventory',this)">Inventory</button>
  <button class="tab" onclick="showPage('shop',this)">Shopping List</button>
  <button class="tab" onclick="showPage('mealcheck',this)">Meal Checker</button>
</div>

<!-- INVENTORY -->
<div class="page active" id="inventory">
  <div style="height:.75rem"></div>
  <div class="summary-grid" id="summary-grid"></div>

  <div class="add-panel">
    <div class="add-panel-title">Add item to inventory</div>
    <div class="add-row">
      <select class="add-select" id="inv-cat">
        <option value="Protein">Protein</option>
        <option value="Carbs / Bases">Carbs / Bases</option>
        <option value="Vegetables">Vegetables</option>
        <option value="Fruits">Fruits</option>
        <option value="Sauces / Spreads">Sauces / Spreads</option>
        <option value="Spices / Indian">Spices / Indian</option>
        <option value="Seasonings">Seasonings</option>
        <option value="Other">Other</option>
      </select>
      <input class="add-input add-name" id="inv-name" placeholder="Item name..." type="text">
      <input class="add-input add-note" id="inv-note" placeholder="Note (optional)" type="text" style="max-width:130px">
      <select class="add-select" id="inv-status">
        <option value="ok">In stock</option>
        <option value="low">Running low</option>
        <option value="out">Out of stock</option>
      </select>
      <button class="add-btn-teal" onclick="addItem()">+ Add</button>
    </div>
  </div>

  <div id="inventory-list"></div>
</div>

<!-- SHOPPING LIST -->
<div class="page" id="shop">
  <div style="height:.75rem"></div>
  <div class="page-title">Shopping <span>list</span></div>

  <div class="add-panel">
    <div class="add-panel-title">Add item to shopping list</div>
    <div class="add-row">
      <input class="add-input add-name" id="shop-name" placeholder="Item name..." type="text">
      <input class="add-input" id="shop-qty" placeholder="Qty / note" type="text" style="max-width:110px">
      <select class="add-select" id="shop-priority">
        <option value="high">Urgent</option>
        <option value="med" selected>Normal</option>
        <option value="low">Eventually</option>
      </select>
      <button class="add-btn-teal" onclick="addShopItem()">+ Add</button>
    </div>
  </div>

  <div id="shop-list"></div>
</div>

<!-- MEAL CHECKER -->
<div class="page" id="mealcheck">
  <div style="height:.75rem"></div>
  <div class="page-title">Meal <span>checker</span></div>
  <p style="font-size:13px;color:var(--ink2);margin-bottom:1rem;line-height:1.6">See which meals you can make right now based on your inventory. Green = ready. Amber = missing something low. Red = missing something.</p>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setMealFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setMealFilter('ready',this)">Can make now</button>
    <button class="filter-btn" onclick="setMealFilter('partial',this)">Almost ready</button>
    <button class="filter-btn" onclick="setMealFilter('missing',this)">Missing items</button>
  </div>

  <div id="meal-check-list"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title" id="modal-title">Confirm</div>
    <div id="modal-body" style="font-size:13px;color:var(--ink2);line-height:1.6"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<script>
// ── MEAL INGREDIENTS MAP ──
// Maps meal names to key ingredients (items that should be in inventory)
const MEAL_INGREDIENTS = {
  'PB + banana toast':['bread','peanut butter','banana'],
  'Eggs + toast':['eggs','bread'],
  'Oatmeal + banana + PB':['oats','banana','peanut butter'],
  'Boiled eggs + bread':['eggs','bread'],
  'Egg sandwich':['eggs','bread','mayo'],
  'Egg + spinach scramble':['eggs','spinach'],
  'PB sandwich':['bread','peanut butter'],
  'Banana + dry fruits':['banana','dry fruits'],
  'Pancakes + honey':['pancake mix','honey'],
  'Cereal + fruit':['kellogg\'s cereal'],
  'Chicken masala rice':['chicken','rice','onion','ginger garlic paste','chicken masala'],
  'Biryani-style rice':['chicken','rice','biryani masala','onion'],
  'Teriyaki chicken bowl':['chicken','rice','teriyaki marinade'],
  'Chicken wrap':['chicken','tortilla'],
  'Chicken burrito':['chicken','tortilla','rice','canned beans','salsa'],
  'Tuna wrap':['canned tuna','tortilla','mayo'],
  'Tuna rice bowl':['canned tuna','rice','mayo'],
  'Tuna sandwich':['canned tuna','bread','mayo'],
  'Bean burrito':['canned beans','tortilla','rice','salsa'],
  'Rajma + rice':['canned beans','rice','onion','tomato'],
  'Chickpea masala wrap':['canned beans','tortilla'],
  'Tomato rice':['rice','tomato'],
  'Puliyogre':['rice','puliyogre powder'],
  'Vangibath':['rice','vangibath powder'],
  'Khichdi':['rice','turmeric'],
  'Egg rice':['eggs','rice'],
  'Egg bhurji + bread':['eggs','onion','tomato','bread'],
  'Broccoli stir fry':['olive oil','garlic powder'],
  'Carrot + peas sauté':['mustard seeds'],
  'Potato fry':['turmeric','mustard seeds'],
  'Spinach + eggs':['eggs','spinach'],
  'Egg wrap':['eggs','tortilla'],
  'Tuna wrap (light)':['canned tuna','tortilla','mayo'],
  'Ham sandwich':['bread','black forest ham','mayo','pickle'],
  'Simple pulao':['rice'],
  'Leftover rice + spices':['rice'],
};

// ── DEFAULT INVENTORY ──
const DEFAULT_INVENTORY = [
  {cat:'Protein',name:'Chicken thighs',status:'ok',note:''},
  {cat:'Protein',name:'Eggs',status:'ok',note:''},
  {cat:'Protein',name:'Black Forest ham',status:'ok',note:''},
  {cat:'Protein',name:'Canned tuna',status:'ok',note:''},
  {cat:'Protein',name:'Canned beans',status:'ok',note:''},
  {cat:'Carbs / Bases',name:'Rice',status:'ok',note:''},
  {cat:'Carbs / Bases',name:'Tortilla',status:'ok',note:''},
  {cat:'Carbs / Bases',name:'Bread',status:'ok',note:''},
  {cat:'Carbs / Bases',name:'Oats',status:'ok',note:''},
  {cat:'Carbs / Bases',name:'Pancake mix',status:'ok',note:''},
  {cat:'Carbs / Bases',name:"Kellogg's cereal",status:'ok',note:''},
  {cat:'Carbs / Bases',name:'MTR ready mix',status:'ok',note:''},
  {cat:'Vegetables',name:'Onion',status:'ok',note:''},
  {cat:'Vegetables',name:'Tomato',status:'ok',note:''},
  {cat:'Vegetables',name:'Spinach + lettuce mix',status:'ok',note:''},
  {cat:'Vegetables',name:'Corn',status:'ok',note:''},
  {cat:'Vegetables',name:'Green chilies',status:'ok',note:''},
  {cat:'Fruits',name:'Banana',status:'ok',note:''},
  {cat:'Fruits',name:'Apple',status:'ok',note:''},
  {cat:'Fruits',name:'Blackberry',status:'ok',note:''},
  {cat:'Sauces / Spreads',name:'Salsa',status:'ok',note:''},
  {cat:'Sauces / Spreads',name:'Jalapeño ranch',status:'ok',note:''},
  {cat:'Sauces / Spreads',name:'Chick-fil-A sauce',status:'ok',note:''},
  {cat:'Sauces / Spreads',name:'Mayo',status:'ok',note:''},
  {cat:'Sauces / Spreads',name:'Sriracha',status:'ok',note:''},
  {cat:'Sauces / Spreads',name:'Soy sauce',status:'ok',note:''},
  {cat:'Sauces / Spreads',name:'Teriyaki marinade',status:'ok',note:''},
  {cat:'Sauces / Spreads',name:'Peanut butter',status:'ok',note:''},
  {cat:'Sauces / Spreads',name:'Jam (grape)',status:'ok',note:''},

  {cat:'Spices / Indian',name:'Ginger garlic paste',status:'ok',note:''},
  {cat:'Spices / Indian',name:'Minced garlic',status:'ok',note:''},
  {cat:'Spices / Indian',name:'Biryani masala',status:'ok',note:''},
  {cat:'Spices / Indian',name:'Puliyogre powder',status:'ok',note:''},
  {cat:'Spices / Indian',name:'Vangibath powder',status:'ok',note:''},
  {cat:'Spices / Indian',name:'Chaat masala',status:'ok',note:''},
  {cat:'Spices / Indian',name:'Mustard seeds',status:'ok',note:''},
  {cat:'Spices / Indian',name:'Cardamom, cinnamon, cloves',status:'ok',note:''},
  {cat:'Spices / Indian',name:'Red chili powder',status:'ok',note:''},

  {cat:'Seasonings',name:"Trader Joe's 21 seasoning",status:'ok',note:''},
  {cat:'Other',name:'Olive oil',status:'ok',note:''},
  {cat:'Other',name:'Pickle',status:'ok',note:''},
  {cat:'Other',name:'Dry fruits',status:'ok',note:''},
  {cat:'Other',name:'Snacks',status:'ok',note:''},
];

const CAT_COLORS = {
  'Protein':'teal','Carbs / Bases':'amber','Vegetables':'green',
  'Fruits':'coral','Sauces / Spreads':'blue','Spices / Indian':'purple',
  'Seasonings':'amber','Other':'gray'
};
const CAT_DOT = {
  teal:'var(--b-teal)',amber:'var(--b-amber)',green:'var(--b-green)',
  coral:'var(--b-coral)',blue:'var(--b-blue)',purple:'var(--b-purple)',gray:'var(--ink3)'
};
const TAG_STYLE = {
  teal:'background:var(--l-teal);color:var(--d-teal)',
  amber:'background:var(--l-amber);color:var(--d-amber)',
  green:'background:var(--l-green);color:var(--d-green)',
  coral:'background:var(--l-coral);color:var(--d-coral)',
  blue:'background:var(--l-blue);color:var(--d-blue)',
  purple:'background:var(--l-purple);color:var(--d-purple)',
  gray:'background:#F1EFE8;color:#444441'
};

let collapsed = {};
let mealFilter = 'all';

function loadInv(){
  try{const s=localStorage.getItem('groceryInv');return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_INVENTORY));}catch{return JSON.parse(JSON.stringify(DEFAULT_INVENTORY));}
}
function saveInv(d){localStorage.setItem('groceryInv',JSON.stringify(d));}
function loadShop(){try{return JSON.parse(localStorage.getItem('groceryShop')||'[]');}catch{return [];}}
function saveShop(d){localStorage.setItem('groceryShop',JSON.stringify(d));}

// ── SUMMARY ──
function renderSummary(){
  const inv=loadInv();
  const ok=inv.filter(i=>i.status==='ok').length;
  const low=inv.filter(i=>i.status==='low').length;
  const out=inv.filter(i=>i.status==='out').length;
  document.getElementById('summary-grid').innerHTML=`
    <div class="summary-card sc-total"><div class="sc-num">${inv.length}</div><div class="sc-label">Total items</div></div>
    <div class="summary-card sc-ok"><div class="sc-num">${ok}</div><div class="sc-label">In stock</div></div>
    <div class="summary-card sc-low"><div class="sc-num">${low}</div><div class="sc-label">Running low</div></div>
    <div class="summary-card sc-out"><div class="sc-num">${out}</div><div class="sc-label">Out of stock</div></div>
  `;
}

// ── INVENTORY ──
function renderInventory(){
  renderSummary();
  const inv=loadInv();
  const cats=[...new Set(inv.map(i=>i.cat))];
  const el=document.getElementById('inventory-list');
  el.innerHTML=cats.map(cat=>{
    const items=inv.filter(i=>i.cat===cat);
    const col=CAT_COLORS[cat]||'gray';
    const dot=CAT_DOT[col];
    const isCollapsed=collapsed[cat];
    return `<div class="cat-block">
      <div class="cat-header" onclick="toggleCat('${cat}')">
        <span class="cat-dot" style="background:${dot}"></span>
        <span class="cat-title">${cat}</span>
        <span class="cat-count">${items.filter(i=>i.status==='out').length>0?`<span style="color:var(--b-red)">${items.filter(i=>i.status==='out').length} out</span> · `:''} ${items.length} items</span>
        <span class="cat-chevron" style="transform:${isCollapsed?'rotate(-90deg)':''}">▾</span>
      </div>
      <div class="cat-body${isCollapsed?' collapsed':''}">
        ${items.map((item,idx)=>renderItemRow(item,inv.indexOf(item))).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderItemRow(item,idx){
  const statusLabels={ok:'In stock',low:'Running low',out:'Out of stock'};
  const statusClass={ok:'s-ok',low:'s-low',out:'s-out'};
  const nextStatus={ok:'low',low:'out',out:'ok'};
  return `<div class="item-row" id="item-${idx}">
    <span class="item-name${item.status==='out'?' out':''}">${item.name}</span>
    ${item.note?`<span class="item-note" title="${item.note}">${item.note}</span>`:''}
    <button class="status-btn ${statusClass[item.status]}" onclick="cycleStatus(${idx})">${statusLabels[item.status]}</button>
    <button class="status-btn s-out" style="padding:4px 8px;font-size:11px" onclick="addToShopFromInv(${idx})" title="Add to shopping list">+ list</button>
    <button class="item-delete" onclick="confirmDeleteItem(${idx})">×</button>
  </div>`;
}

function toggleCat(cat){
  collapsed[cat]=!collapsed[cat];
  renderInventory();
}

function cycleStatus(idx){
  const inv=loadInv();
  const order=['ok','low','out'];
  const cur=order.indexOf(inv[idx].status);
  inv[idx].status=order[(cur+1)%3];
  saveInv(inv);
  renderInventory();
}

function addItem(){
  const cat=document.getElementById('inv-cat').value;
  const name=document.getElementById('inv-name').value.trim();
  const note=document.getElementById('inv-note').value.trim();
  const status=document.getElementById('inv-status').value;
  if(!name)return;
  const inv=loadInv();
  inv.push({cat,name,status,note});
  saveInv(inv);
  document.getElementById('inv-name').value='';
  document.getElementById('inv-note').value='';
  renderInventory();
}

function confirmDeleteItem(idx){
  const inv=loadInv();
  showModal('Remove item','Remove "'+inv[idx].name+'" from inventory?',()=>{
    inv.splice(idx,1);saveInv(inv);renderInventory();
  });
}

function addToShopFromInv(idx){
  const inv=loadInv();
  const item=inv[idx];
  addShopItemData(item.name,'',item.status==='out'?'high':'med');
}

function autoAddLowToShop(){
  const inv=loadInv();
  const lowOut=inv.filter(i=>i.status==='low'||i.status==='out');
  if(!lowOut.length){alert('Nothing is low or out of stock!');return;}
  lowOut.forEach(i=>addShopItemData(i.name,'',i.status==='out'?'high':'med'));
  showPage('shop',document.querySelectorAll('.tab')[1]);
}

// ── SHOPPING LIST ──
function addShopItemData(name,qty,priority){
  const shop=loadShop();
  if(shop.find(s=>s.name.toLowerCase()===name.toLowerCase()&&!s.checked))return;
  shop.push({name,qty,priority,checked:false,id:Date.now()+Math.random()});
  saveShop(shop);
  renderShopList();
}

function addShopItem(){
  const name=document.getElementById('shop-name').value.trim();
  const qty=document.getElementById('shop-qty').value.trim();
  const priority=document.getElementById('shop-priority').value;
  if(!name)return;
  addShopItemData(name,qty,priority);
  document.getElementById('shop-name').value='';
  document.getElementById('shop-qty').value='';
}

function renderShopList(){
  const shop=loadShop();
  const el=document.getElementById('shop-list');
  if(!shop.length){el.innerHTML='<div class="empty-msg">Your shopping list is empty.<br>Items marked low or out will appear here.</div>';return;}
  const priorities=[{k:'high',label:'Urgent — get this trip',col:'priority-high'},{k:'med',label:'This week',col:'priority-med'},{k:'low',label:'Eventually',col:'priority-low'}];
  let html='';
  let hasClear=shop.some(s=>s.checked);
  priorities.forEach(p=>{
    const items=shop.filter(s=>s.priority===p.k);
    if(!items.length)return;
    html+=`<div class="shop-section">
      <div class="shop-section-title"><span style="width:3px;height:13px;background:${p.k==='high'?'var(--b-red)':p.k==='med'?'var(--b-amber)':'var(--b-blue)'};border-radius:2px;display:inline-block"></span>${p.label}</div>`;
    items.forEach(item=>{
      html+=`<div class="shop-item">
        <div class="shop-check${item.checked?' checked':''}" onclick="toggleShopCheck('${item.id}')">${item.checked?'✓':''}</div>
        <span class="shop-item-name${item.checked?' checked':''}">${item.name}${item.qty?` <span style="color:var(--ink3);font-size:12px">— ${item.qty}</span>`:''}</span>
        <button class="shop-item-remove" onclick="removeShopItem('${item.id}')">×</button>
      </div>`;
    });
    html+='</div>';
  });
  if(hasClear) html+=`<button onclick="clearChecked()" style="background:none;border:1px solid var(--border);border-radius:var(--rsm);padding:7px 14px;font-size:12px;color:var(--ink3);margin-top:.5rem">Clear checked items</button>`;
  el.innerHTML=html;
}

function toggleShopCheck(id){
  const shop=loadShop();
  const item=shop.find(s=>s.id==id);
  if(item){item.checked=!item.checked;saveShop(shop);renderShopList();}
}

function removeShopItem(id){
  saveShop(loadShop().filter(s=>s.id!=id));
  renderShopList();
}

function clearChecked(){
  saveShop(loadShop().filter(s=>!s.checked));
  renderShopList();
}

// ── MEAL CHECKER ──
function renderMealChecker(){
  const inv=loadInv();
  const invMap={};
  inv.forEach(i=>{ invMap[i.name.toLowerCase()]=i.status; });

  const meals=Object.entries(MEAL_INGREDIENTS);
  let filtered=meals.map(([meal,ings])=>{
    const ingStatus=ings.map(ing=>{
      const key=ing.toLowerCase();
      // fuzzy match
      const match=Object.keys(invMap).find(k=>k.includes(key)||key.includes(k.split(' ')[0]));
      const status=match?invMap[match]:null;
      return {ing,status:status||'missing'};
    });
    const missing=ingStatus.filter(i=>i.status==='missing'||i.status==='out');
    const low=ingStatus.filter(i=>i.status==='low');
    let readiness='ready';
    if(missing.length>0)readiness='missing';
    else if(low.length>0)readiness='partial';
    return {meal,ingStatus,readiness};
  });

  if(mealFilter==='ready')filtered=filtered.filter(m=>m.readiness==='ready');
  else if(mealFilter==='partial')filtered=filtered.filter(m=>m.readiness==='partial');
  else if(mealFilter==='missing')filtered=filtered.filter(m=>m.readiness==='missing');

  const el=document.getElementById('meal-check-list');
  if(!filtered.length){el.innerHTML='<div class="empty-msg">No meals match this filter.</div>';return;}

  const badgeMap={ready:'mc-ok ready',partial:'mc-partial partial',missing:'mc-missing missing'};
  const labelMap={ready:'Ready to make',partial:'Almost — low on something',missing:'Missing items'};

  el.innerHTML=filtered.map(({meal,ingStatus,readiness})=>`
    <div class="meal-check-card">
      <div class="mc-meal-name">${meal}</div>
      <div class="mc-status">
        <span class="mc-badge ${badgeMap[readiness]}">${labelMap[readiness]}</span>
      </div>
      <div class="mc-ing-row">
        ${ingStatus.map(({ing,status})=>`<span class="mc-ing ${status==='ok'?'have':status==='low'?'low':'missing'}">${ing}</span>`).join('')}
      </div>
      ${readiness==='missing'?`<button onclick="addMissingToShop('${meal.replace(/'/g,"\\'")}','${encodeURIComponent(JSON.stringify(ingStatus))}')" style="margin-top:9px;background:var(--l-red);color:var(--d-red);border:1px solid var(--b-red);border-radius:var(--rsm);padding:5px 12px;font-size:11px;font-weight:500">+ Add missing to shopping list</button>`:''}
    </div>`).join('');
}

function addMissingToShop(meal,encoded){
  const ings=JSON.parse(decodeURIComponent(encoded));
  ings.filter(i=>i.status==='missing'||i.status==='out'||i.status==='low').forEach(i=>{
    addShopItemData(i.ing,'for '+meal,i.status==='low'?'med':'high');
  });
  showPage('shop',document.querySelectorAll('.tab')[1]);
}

function setMealFilter(f,btn){
  mealFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMealChecker();
}

// ── MODAL ──
let modalCb=null;
function showModal(title,body,cb){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').textContent=body;
  modalCb=cb;
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('modal-confirm').onclick=()=>{if(modalCb)modalCb();closeModal();};
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}

// ── NAV ──
function showPage(id,tabEl){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  tabEl.classList.add('active');
  if(id==='shop')renderShopList();
  if(id==='mealcheck')renderMealChecker();
  if(id==='inventory')renderInventory();
}

// ── INIT ──
renderInventory();
</script>
</body>
</html>
